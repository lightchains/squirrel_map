<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  header {
    background: #2c2a22;
    color: #f5f2eb;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  header .title-block p {
    font-size: 13px;
    color: #a09880;
    margin-top: 3px;
  }
  header .stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stat-pill {
    text-align: center;
  }
  .stat-pill .num {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f5f2eb;
    line-height: 1;
  }
  .stat-pill .lbl {
    font-size: 11px;
    color: #a09880;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-top: 2px;
  }

  .toolbar {
    background: #ede9df;
    border-bottom: 1px solid #d4cfc3;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar span.label {
    font-size: 12px;
    font-weight: 500;
    color: #7a7060;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #fff;
    border: 1px solid #ccc9be;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: #7a7060;
    transition: all 0.15s;
  }
  .filter-btn .dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .filter-btn.active { border-color: transparent; color: #2c2a22; font-weight: 500; }
  .filter-btn.active.gray { background: #e8e6f5; border-color: #9b95d8; color: #3c3489; }
  .filter-btn.active.cin  { background: #faece7; border-color: #d87050; color: #7a3010; }
  .filter-btn.active.blk  { background: #e8e7e4; border-color: #888; color: #2c2a22; }
  .filter-btn:not(.active) { opacity: 0.5; }

  .count-badge {
    margin-left: auto;
    background: #2c2a22;
    color: #f5f2eb;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 500;
  }

  #map {
    width: 100%;
    height: calc(100vh - 130px);
    min-height: 420px;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .leaflet-popup-tip { display: none; }

  .legend {
    background: #fff;
    border: 1px solid #d4cfc3;
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: #2c2a22;
    line-height: 1.9;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .legend strong {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #7a7060;
    margin-bottom: 4px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: #a09880;
    padding: 6px;
    pointer-events: none;
    z-index: 999;
  }
</style>

  if (s === 'black') return 'blk';

  const colorName = { gray:'Gray', cin:'Cinnamon', blk:'Black', unk:'Unknown' }[key];

    radius: 4.5,
    fillColor: colorMap[key],
    color: 'rgba(0,0,0,0.2)',
    weight: 0.8,
    fillOpacity: 0.78
  }).bindPopup(tooltip);

  const key = getKey(primary);
  makeCircle(lat, lng, key, location, age, shift).addTo(layers[key]);
});

const active = { gray: true, cin: true, blk: true };
Object.values(layers).forEach(l => l.addTo(map));

function toggle(key, btn) {
  active[key] = !active[key];
  btn.classList.toggle('active', active[key]);
  if (active[key]) layers[key].addTo(map);
  else map.removeLayer(layers[key]);
  updateCount();
}

const counts = { gray: 2473, cin: 392, blk: 103 };
function updateCount() {
  let t = 0;
  Object.keys(active).forEach(k => { if (active[k]) t += counts[k]; });
  document.getElementById('count').textContent = 'Showing ' + t.toLocaleString() + ' sightings';
}

const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div', 'legend');
  d.innerHTML = '<strong>Fur color</strong>' +
    '<div class="legend-row"><span class="legend-dot" style="background:#7F77DD;"></span>Gray (82%)</div>' +
    '<div class="legend-row"><span class="legend-dot" style="background:#D85A30;"></span>Cinnamon (13%)</div>' +
    '<div class="legend-row"><span class="legend-dot" style="background:#555;"></span>Black (3.4%)</div>';
  return d;
};
legend.addTo(map);
